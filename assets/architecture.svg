<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" fill="none">
  <!-- User -->
  <text x="300" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">사용자</text>

  <!-- Branch -->
  <line x1="300" y1="38" x2="300" y2="52" stroke="white" stroke-width="1.5"/>
  <line x1="300" y1="52" x2="160" y2="52" stroke="white" stroke-width="1.5"/>
  <line x1="300" y1="52" x2="440" y2="52" stroke="white" stroke-width="1.5"/>
  <line x1="160" y1="52" x2="160" y2="62" stroke="white" stroke-width="1.5"/>
  <line x1="440" y1="52" x2="440" y2="62" stroke="white" stroke-width="1.5"/>

  <!-- Web Chat -->
  <rect x="60" y="62" width="200" height="34" rx="4" stroke="white" stroke-width="1.5" fill="rgba(255,255,255,0.06)"/>
  <text x="160" y="84" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Web Chat UI (S3+CF)</text>

  <!-- Telegram -->
  <rect x="340" y="62" width="200" height="34" rx="4" stroke="white" stroke-width="1.5" fill="rgba(255,255,255,0.06)"/>
  <text x="440" y="84" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">Telegram Bot</text>

  <!-- Merge arrow -->
  <line x1="160" y1="96" x2="160" y2="118" stroke="white" stroke-width="1.5"/>
  <line x1="440" y1="96" x2="440" y2="118" stroke="white" stroke-width="1.5"/>
  <line x1="160" y1="118" x2="440" y2="118" stroke="white" stroke-width="1.5"/>
  <line x1="300" y1="118" x2="300" y2="132" stroke="white" stroke-width="1.5"/>
  <polygon points="294,129 300,140 306,129" fill="white"/>

  <!-- API Gateway -->
  <rect x="120" y="140" width="360" height="38" rx="4" stroke="#FF9900" stroke-width="1.5" fill="rgba(255,153,0,0.08)"/>
  <text x="300" y="164" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">API Gateway (WS + REST)</text>

  <!-- Arrow -->
  <line x1="300" y1="178" x2="300" y2="198" stroke="white" stroke-width="1.5"/>
  <polygon points="294,195 300,206 306,195" fill="white"/>

  <!-- Gateway Lambda -->
  <rect x="120" y="206" width="360" height="38" rx="4" stroke="#FF9900" stroke-width="1.5" fill="rgba(255,153,0,0.08)"/>
  <text x="300" y="230" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="bold">Gateway Lambda x 7</text>

  <!-- Smart Router label -->
  <text x="300" y="258" text-anchor="middle" fill="#00BFFF" font-family="sans-serif" font-size="11" font-weight="bold">Smart Routing</text>

  <!-- Branch to Lambda Agent (left) and Fargate (right) -->
  <line x1="300" y1="262" x2="300" y2="272" stroke="#00BFFF" stroke-width="1.5"/>
  <line x1="300" y1="272" x2="170" y2="272" stroke="#00BFFF" stroke-width="1.5"/>
  <line x1="300" y1="272" x2="430" y2="272" stroke="#00BFFF" stroke-width="1.5"/>
  <line x1="170" y1="272" x2="170" y2="285" stroke="#00BFFF" stroke-width="1.5"/>
  <polygon points="164,282 170,293 176,282" fill="#00BFFF"/>
  <line x1="430" y1="272" x2="430" y2="285" stroke="#00BFFF" stroke-width="1.5"/>
  <polygon points="424,282 430,293 436,282" fill="#00BFFF"/>

  <!-- Left: Lambda Agent -->
  <rect x="70" y="293" width="200" height="60" rx="6" stroke="#FF9900" stroke-width="2" fill="rgba(255,153,0,0.05)"/>
  <text x="170" y="326" text-anchor="middle" fill="#FF9900" font-family="sans-serif" font-size="11" font-weight="bold">Lambda Agent</text>

  <!-- Right: Fargate container -->
  <rect x="330" y="293" width="200" height="60" rx="6" stroke="#FF9900" stroke-width="2" fill="rgba(255,153,0,0.05)"/>
  <text x="430" y="312" text-anchor="middle" fill="#FF9900" font-family="sans-serif" font-size="11" font-weight="bold">ECS Fargate</text>
  <rect x="345" y="320" width="80" height="24" rx="3" stroke="white" stroke-width="1" fill="rgba(255,255,255,0.06)"/>
  <text x="385" y="337" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">Bridge</text>
  <text x="440" y="337" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="14">&#x21C4;</text>
  <rect x="455" y="320" width="60" height="24" rx="3" stroke="white" stroke-width="1" fill="rgba(255,255,255,0.06)"/>
  <text x="485" y="337" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">OC GW</text>

  <!-- Routing labels -->
  <text x="170" y="288" text-anchor="middle" fill="#00BFFF" font-family="sans-serif" font-size="10">default (fast)</text>
  <text x="430" y="288" text-anchor="middle" fill="#00BFFF" font-family="sans-serif" font-size="10">reuse / /heavy</text>

  <!-- Arrows to storage -->
  <line x1="170" y1="353" x2="170" y2="392" stroke="white" stroke-width="1.5"/>
  <polygon points="164,389 170,400 176,389" fill="white"/>

  <line x1="430" y1="353" x2="430" y2="392" stroke="white" stroke-width="1.5"/>
  <polygon points="424,389 430,400 436,389" fill="white"/>

  <!-- Storage outer box -->
  <rect x="55" y="400" width="490" height="60" rx="6" stroke="white" stroke-width="1.5" fill="rgba(255,255,255,0.03)"/>
  <text x="300" y="415" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">Storage</text>

  <!-- Storage items inside -->
  <rect x="75" y="422" width="130" height="30" rx="4" stroke="white" stroke-width="1" fill="rgba(255,255,255,0.06)"/>
  <text x="140" y="442" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13">DynamoDB x 5</text>

  <rect x="235" y="422" width="130" height="30" rx="4" stroke="white" stroke-width="1" fill="rgba(255,255,255,0.06)"/>
  <text x="300" y="442" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13">S3 (Sessions)</text>

  <rect x="395" y="422" width="130" height="30" rx="4" stroke="white" stroke-width="1" fill="rgba(255,255,255,0.06)"/>
  <text x="460" y="442" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13">SSM</text>

  <!-- Monitoring (right side) -->
  <rect x="570" y="140" width="110" height="320" rx="6" stroke="#9966FF" stroke-width="1.5" fill="rgba(153,102,255,0.05)"/>
  <text x="625" y="160" text-anchor="middle" fill="#9966FF" font-family="sans-serif" font-size="11" font-weight="bold">Monitoring</text>
  <text x="625" y="200" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">CloudWatch</text>
  <text x="625" y="218" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">Dashboard</text>
  <text x="625" y="255" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">Custom</text>
  <text x="625" y="273" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">Metrics x 10</text>
  <text x="625" y="310" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">EventBridge</text>
  <text x="625" y="328" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">Watchdog</text>
  <text x="625" y="365" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11">Prewarm</text>
  <text x="625" y="383" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="10">(Optional)</text>

  <!-- CDK stacks note -->
  <text x="340" y="490" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="11">9 CDK Stacks: Secrets → Network → Storage → Auth / Compute / LambdaAgent → Api → Web / Monitoring</text>
</svg>
